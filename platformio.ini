[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial Monitor speed
monitor_speed = 115200

; Upload speed (faster uploads)
upload_speed = 921600

; Required libraries
lib_deps = 
    bodmer/TFT_eSPI@^2.5.43
    tzapu/WiFiManager@^2.0.17
    bblanchon/ArduinoJson@^7.2.0
    igorantolic/Ai Esp32 Rotary Encoder@^1.7

; Build flags (optional, for debugging)
build_flags = 
    -DCORE_DEBUG_LEVEL=3