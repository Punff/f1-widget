[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial Monitor speed
monitor_speed = 115200

; Upload speed (faster uploads)
upload_speed = 921600

; Single-app layout: 3.7MB factory, 256KB SPIFFS
board_build.partitions = partitions.csv
board_build.filesystem = littlefs

; PSRAM currently disabled — board may not have it on correct pins
; board_build.psram = enable
; board_build.psram_mode = qio

; Required libraries
lib_deps = 
    lovyan03/LovyanGFX
    tzapu/WiFiManager@^2.0.17
    bblanchon/ArduinoJson@^7.2.0
    igorantolic/Ai Esp32 Rotary Encoder@^1.7
    ricmoo/QRCode

; Build flags
build_flags = 
    -Os
    -DCORE_DEBUG_LEVEL=0
    -Iinclude
